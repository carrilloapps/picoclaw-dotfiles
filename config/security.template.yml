# =============================================================================
# PicoClaw Security Configuration Template
# =============================================================================
# Location on device: ~/.picoclaw/.security.yml
#
# Replace <PLACEHOLDER> values with your actual keys.
# NEVER commit the real .security.yml file.
#
# v0.2.6 CRITICAL:
#   - API keys in model_list are REQUIRED or the gateway exits silently.
#   - Keys under model_list are indexed by model_name (from config.json), not
#     by provider name. E.g., "azure-gpt4o:0" not "azure:0".
#   - The ":0" suffix is the index (first key in the api_keys array).
# =============================================================================

channels:
  telegram:
    token: "<YOUR_TELEGRAM_BOT_TOKEN>"

model_list:
  # Google AI Studio (Gemini via OpenAI-compatible endpoint)
  gemini-2.5-flash:0:
    api_keys:
      - "<YOUR_GOOGLE_AI_STUDIO_API_KEY>"
  gemini-2.5-pro:0:
    api_keys:
      - "<YOUR_GOOGLE_AI_STUDIO_API_KEY>"

  # Azure OpenAI (replace "azure-gpt4o" with your model_name from config.json)
  azure-gpt4o:0:
    api_keys:
      - "<YOUR_AZURE_OPENAI_API_KEY>"

  # Ollama Cloud (replace "gpt-oss:120b" with your model_name from config.json)
  gpt-oss:120b:0:
    api_keys:
      - "<YOUR_OLLAMA_API_KEY>"

voice:
  groq_api_key: "<YOUR_GROQ_API_KEY>"
  elevenlabs_api_key: ""

web: {}
skills: {}
